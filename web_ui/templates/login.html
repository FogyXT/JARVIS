<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarvis — Prihlásenie</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0708;
            color: #e0d0c0;
            min-height: 100dvh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            width: 100%; max-width: 360px; padding: 32px 24px;
        }
        .login-logo {
            text-align: center; margin-bottom: 32px;
        }
        .login-logo .icon {
            font-size: 48px;
            filter: drop-shadow(0 0 12px rgba(201,168,76,0.4));
            animation: pulse-glow 3s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(201,168,76,0.3)); }
            50% { filter: drop-shadow(0 0 18px rgba(201,168,76,0.6)); }
        }
        .login-logo h1 {
            font-size: 28px; font-weight: 800;
            background: linear-gradient(135deg, #c9a84c, #e8c56d, #c9a84c);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-top: 8px;
        }
        .login-logo p { color: #6a5a4a; margin-top: 6px; font-size: 14px; }
        .field {
            margin-bottom: 16px;
        }
        .field label {
            display: block; font-size: 13px; color: #8a7a6a;
            margin-bottom: 6px; font-weight: 500;
        }
        .field input {
            width: 100%; padding: 12px 14px;
            background: #1a0e12; border: 1px solid #2a151b88;
            border-radius: 10px; color: #e0d0c0; font-size: 16px;
            outline: none; transition: border-color 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .field input:focus {
            border-color: #c9a84c88;
            box-shadow: 0 0 0 3px rgba(201,168,76,0.06);
        }
        .field input::placeholder { color: #4a3a2a; }
        .btn {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, #c9a84c, #e8c56d);
            color: #1a0e12; font-weight: 700; font-size: 16px;
            border: none; border-radius: 10px; cursor: pointer;
            margin-top: 8px;
            transition: transform 0.15s, box-shadow 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.4; }
        .error {
            color: #e74a4a; font-size: 13px; text-align: center;
            margin-top: 12px; min-height: 20px;
        }
        .hint {
            text-align: center; margin-top: 20px;
            font-size: 12px; color: #4a3a2a;
        }
    </style>
</head>
<body>
<div class="login-box">
    <div class="login-logo">
        <div class="icon">⚡</div>
        <h1>Jarvis</h1>
        <p>Prihlás sa pre prístup</p>
    </div>
    <form id="login-form">
        <div class="field">
            <label for="user">Meno</label>
            <input id="user" type="text" placeholder="Tvoje meno" autocomplete="username" autofocus>
        </div>
        <div class="field">
            <label for="pass">Heslo</label>
            <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn" type="submit">Prihlásiť sa</button>
        <div class="error" id="error"></div>
    </form>
    <div class="hint">🔒 Chránené heslom</div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = this.querySelector('.btn');
    const error = document.getElementById('error');
    btn.disabled = true;
    btn.textContent = '⏳';
    error.textContent = '';

    try {
        const resp = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user: document.getElementById('user').value,
                pass: document.getElementById('pass').value
            })
        });
        const data = await resp.json();
        if (data.ok) {
            window.location.href = '/';
        } else {
            error.textContent = data.error || 'Nesprávne prihlasovacie údaje';
            btn.disabled = false;
            btn.textContent = 'Prihlásiť sa';
        }
    } catch (err) {
        error.textContent = 'Spojenie zlyhalo';
        btn.disabled = false;
        btn.textContent = 'Prihlásiť sa';
    }
});
</script>
</body>
</html>
